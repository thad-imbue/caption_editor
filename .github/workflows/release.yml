name: Build, sign & publish macOS DMG

# Fires on a `v*` tag push (the typical release flow — see CLAUDE.md →
# "Version Management" for the two-commit dance that precedes the
# tag), and also exposes a workflow_dispatch button for one-off
# rebuilds at an arbitrary ref.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit ref to build (default: current branch)'
        required: false
        type: string

# Required secrets (configure in repo settings → Secrets and
# variables → Actions). Each step that uses them references them
# explicitly via `env:` so the dependency is visible at the call
# site rather than buried in implicit defaults.
#
# Secret names mirror those used by the sqlitebrowser doltlite
# release workflow so the same values can be shared across both
# repos without redefining them — see also
# ../../scripts/build-released-app.sh for the local-dev equivalents.
#
#   MACOS_CODESIGN_P12             base64-encoded .p12 of the Developer
#                                  ID Application cert + private key.
#                                  Re-exposed below as CSC_LINK, which
#                                  electron-builder reads by convention
#                                  and uses to import the cert into a
#                                  temporary keychain for signing.
#
#   MACOS_CODESIGN_P12_PW          password used when exporting the .p12.
#                                  Re-exposed below as CSC_KEY_PASSWORD.
#
#   MACOS_CODESIGN_APPLE_ID        Apple ID email tied to the developer
#                                  account that issued the cert.
#
#   MACOS_CODESIGN_APPLE_PW        App-specific password generated at
#                                  appleid.apple.com → Sign-In and
#                                  Security → App-Specific Passwords.
#                                  Used by xcrun notarytool.
#
#   MACOS_CODESIGN_TEAM_ID         Apple developer team id (10-char).
#                                  Currently hardcoded as "RWVMRK3723"
#                                  in scripts/build-released-app.sh; we
#                                  mirror that as the default below and
#                                  allow a secret override for forks.

jobs:
  build-and-publish:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write  # required to create / update the GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          # Full history so any future stamping that needs `git
          # describe` works; cheap on this repo.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cache the per-electron-version pre-built binaries. electron's
      # postinstall otherwise re-downloads ~150MB of platform binaries
      # on every cold runner.
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      # Cache electron-builder's app-image scratch + macOS toolchain
      # downloads (notarize helper, lzma-native, etc.). Largest savings
      # after the first build at a given lockfile state.
      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: npm ci

      # Sanity check: if this is a tag push, assert that the tag name
      # matches the APP_VERSION literal in electron/constants.ts. This
      # catches the common mistake of pushing the tag at the wrong
      # commit (e.g. tagging commit A of the release dance when
      # APP_VERSION still reflects the previous release). The check is
      # skipped under workflow_dispatch — that path is for one-off
      # rebuilds where the user is deliberately overriding.
      - name: Verify tag matches APP_VERSION
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          APP_VERSION=$(node -p "require('fs').readFileSync('electron/constants.ts','utf8').match(/APP_VERSION = '(.+)'/)[1]")
          if [[ "$TAG" != "$APP_VERSION" ]]; then
            echo "::error::Tag v$TAG does not match APP_VERSION='$APP_VERSION' in electron/constants.ts."
            echo "::error::Did the tag get placed on the wrong commit of the two-commit release dance?"
            exit 1
          fi
          echo "OK: tag v$TAG matches APP_VERSION=$APP_VERSION"

      # Bazel cache. Without this every release cold-builds ort + parakeet-rs
      # + knf-rs-sys (cmake/bindgen for kaldi-native-fbank C++), which is
      # ~10 minutes on a fresh runner. Key from lockfiles only — do not
      # include version.bzl (APP_VERSION bumps every release would otherwise
      # force a new cache namespace each tag). Bazel still rebuilds targets
      # whose inputs change (e.g. rustc_env version stamps).
      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/bazelisk
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: ${{ runner.os }}-bazel-${{ hashFiles('MODULE.bazel.lock', 'transcribe_rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      # `npm run package:mac` chains `build:all → build:rust → electron-builder`,
      # so bazelisk needs to be on PATH before that step runs. The `build:rust`
      # script in package.json invokes `bazelisk build //transcribe_rs/...`
      # and stages the binaries under `dist-rust/`, which electron-builder
      # then copies into Contents/Resources/bin/ via the extraResources
      # entries in electron-builder.json. Signing falls out automatically
      # — electron-builder's `--mac` packager runs codesign over every
      # Mach-O it finds inside the .app, including our two binaries.
      - name: Install Bazelisk
        run: brew install bazelisk

      # Bundled next to transcribe-rs in Contents/Resources/bin/ (see
      # scripts/stage-ffmpeg.py). We deliberately DON'T `brew install ffmpeg`
      # here: Homebrew's binary is dynamically linked to
      # `/opt/homebrew/Cellar/ffmpeg/<ver>/lib/lib*.dylib`, so the resulting
      # .app crashes on any machine without those exact paths. imageio-ffmpeg
      # ships an osxexperts static build whose only dylib references are
      # under /usr/lib — stage-ffmpeg.py verifies this via `otool -L` and
      # refuses to bundle anything else.
      - name: Install imageio-ffmpeg for bundling
        run: pip3 install --break-system-packages imageio-ffmpeg

      # `npm run package:mac` runs `vue-tsc → vite build → vite build
      # --config vite.electron.config.ts → electron-builder --mac`
      # with the APP_VERSION literal pulled from electron/constants.ts.
      #
      # electron-builder.json sets `"publish": null` (plain JSON — not JSON5,
      # so the "why" lives here). On a tag push, electron-builder otherwise
      # tries implicit GitHub publishing and requires GH_TOKEN; we attach the
      # notarized DMG in "Attach DMG to GitHub Release" below instead.
      #
      # CSC_* env vars are picked up by electron-builder automatically:
      # it imports the .p12 into a temporary keychain and signs the
      # .app with the Developer ID Application identity. We do NOT
      # use electron-builder's built-in @electron/notarize wiring —
      # that path hits a cdhash mismatch (Error 65) during stapling
      # because the patched zip-vs-ditto path diverges from what
      # xcrun expects. Notarization happens in the next step instead.
      - name: Build & sign macOS app
        run: npm run package:mac
        env:
          CSC_LINK: ${{ secrets.MACOS_CODESIGN_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CODESIGN_P12_PW }}
          # electron-builder's notarize hook is disabled — we do it
          # manually below. Setting this to false is harmless either
          # way; it just makes the intent loud.
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'

      # Notarize the .dmg directly via xcrun notarytool. This is the
      # same manual flow scripts/build-released-app.sh uses locally
      # (see the comment block on the "Manual notarization" section
      # of that script for why we don't let electron-builder do it).
      #
      # `--wait` blocks the runner until Apple's notary service
      # finishes (usually 1-5 minutes, occasionally up to 15). The
      # 45-minute job timeout accommodates the slow tail.
      - name: Notarize DMG
        run: |
          APP_VERSION=$(node -p "require('fs').readFileSync('electron/constants.ts','utf8').match(/APP_VERSION = '(.+)'/)[1]")
          DMG_PATH="release/Caption Editor-${APP_VERSION}-arm64.dmg"
          APP_PATH="release/mac-arm64/Caption Editor.app"

          if [[ ! -f "$DMG_PATH" ]]; then
            echo "::error::DMG not found at: $DMG_PATH"
            echo "Available files in release/:"
            ls -la release/ || true
            exit 1
          fi

          echo "Submitting $DMG_PATH to Apple notary service..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "Stapling ticket to DMG..."
          xcrun stapler staple "$DMG_PATH"

          echo "Stapling ticket to .app bundle..."
          xcrun stapler staple "$APP_PATH"

          echo "Validating staples..."
          xcrun stapler validate "$DMG_PATH"
          xcrun stapler validate "$APP_PATH"

          # Stash the path for later steps. `release/` contains both
          # arm64 dmg and zip; only the dmg is what users download.
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_ID: ${{ secrets.MACOS_CODESIGN_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_CODESIGN_APPLE_PW }}
          # Default to the team id baked into
          # scripts/build-released-app.sh; allow a secret override
          # so forks don't have to patch the workflow.
          APPLE_TEAM_ID: ${{ secrets.MACOS_CODESIGN_TEAM_ID || 'RWVMRK3723' }}

      # Keep the artifact for 7 days regardless of release flow —
      # useful for workflow_dispatch runs that don't have a tag to
      # attach to, and as a safety net if the release-upload step
      # below fails for any reason.
      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: caption-editor-macos-dmg
          path: release/*.dmg
          retention-days: 7

      # The Rust ASR binaries ship inside the .dmg (Contents/Resources/bin/),
      # so they're not separately published. They inherit the .app's
      # codesigning + notarization + stapling automatically.

      # Publish to the GitHub Release page only on tag pushes.
      # `softprops/action-gh-release@v2` creates the release if it
      # doesn't exist yet and attaches the DMG. The release body is
      # intentionally minimal — fill in changelog by hand if needed.
      - name: Attach DMG to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.dmg_path }}
          # The action infers tag_name from GITHUB_REF on tag pushes,
          # so leaving it implicit keeps the workflow tag-agnostic.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
